<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px -apple-system, system-ui, sans-serif; width: 280px; margin: 0; padding: 14px; color: #1a1a1a; }
    h1 { font-size: 14px; margin: 0 0 10px; }
    .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .on { background: #2e7d32; } .off { background: #c62828; }
    label { display: flex; align-items: center; gap: 6px; }
    input[type=number] { width: 70px; }
    button { font: inherit; padding: 5px 10px; border: 1px solid #ccc; border-radius: 6px; background: #f6f6f6; cursor: pointer; }
    button:hover { background: #eee; }
    .muted { color: #777; font-size: 12px; }
    code { background: #f0f0f0; padding: 1px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Controlium</h1>
  <div class="row"><span><span id="dot" class="dot off"></span><span id="status">Disconnected</span></span><button id="reconnect">Reconnect</button></div>
  <div class="row"><label>Bridge ports <input id="ports" type="text" placeholder="8765, 8766" style="width:110px" /></label></div>
  <div class="row"><label><input id="autofocus" type="checkbox" /> Bring working tab to front</label></div>
  <div class="row"><label><input id="showcursor" type="checkbox" /> Show synthetic cursor</label></div>
  <div class="row muted" id="curtab"></div>
  <div class="muted">Start the MCP bridge, then Claude can drive this browser.</div>
  <script src="popup.js"></script>
</body>
</html>
